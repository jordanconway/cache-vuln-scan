# Tests CI for cache_vuln_scan.py
#
# Security-hardened per the same guidelines this scanner enforces:
#   * Third-party actions pinned to full 40-char commit SHAs (not tags),
#     with the human-readable version pinned in a trailing comment so
#     Dependabot / Renovate can still find them. See:
#     https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
#   * Top-level `permissions: contents: read` — least privilege; the
#     GITHUB_TOKEN starts out read-only and jobs grant only what they need.
#   * No use of caches in this workflow, so cache-poisoning attacks
#     (Cacheract et al.) don't apply.
#   * No interpolation of untrusted `${{ github.event.* }}` contexts into
#     `run:` blocks, so script injection isn't possible.
#   * `persist-credentials: false` on checkout so the token isn't left in
#     `.git/config` for subsequent steps to harvest.
#   * `concurrency` cancels superseded PR runs but never cancels a main-
#     branch run mid-flight.
#   * Runner pinned to a specific Ubuntu version (not `ubuntu-latest`) so
#     a runner image update doesn't silently change behavior.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default everything to read-only. Override at job-level if you need more.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        # PEP 723 metadata declares requires-python = ">=3.10"; verify
        # every supported minor version still passes.
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile-check scanner
        run: python -m py_compile cache_vuln_scan.py

      - name: Run test suite
        run: python tests/test_detectors.py

  uv-smoke:
    name: PEP 723 metadata smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # Confirms the inline `# /// script ... # ///` block is well-formed
      # and that `uv run` can resolve a Python interpreter for it.
      - name: Verify uv parses inline metadata and runs the script
        run: uv run --no-cache cache_vuln_scan.py --help
